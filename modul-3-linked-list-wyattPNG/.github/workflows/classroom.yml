name: Autograding Tests
on:
  push:
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "[Soal 1] Single Linked List Implementation"
        id: soal1
        uses: education/autograding-command-grader@v1
        with:
          test-name: "Soal 1 - Single Linked List Implementation"
          setup-command: >
            g++ -std=c++23 -O2 -Wall
            -o tests/test_single_linked_list
            tests/test_single_linked_list.cpp single_linked_list.cpp
          command: "./tests/test_single_linked_list"
          timeout: 10
          max-score: 25

      - name: "[Soal 2] Si Palui dan Relikui Siklus Resonansi"
        id: soal2
        uses: education/autograding-command-grader@v1
        with:
          test-name: "Soal 2 - Si Palui dan Relikui Siklus Resonansi"
          setup-command: >
            g++ -std=c++23 -O2
            -o prob_a prob_a.cpp single_linked_list.cpp
          command: "bash tests/grade_io.sh ./prob_a tests/prob_a"
          timeout: 15
          max-score: 25

      - name: "[Soal 3] Double Linked List Implementation"
        id: soal3
        uses: education/autograding-command-grader@v1
        with:
          test-name: "Soal 3 - Double Linked List Implementation"
          setup-command: >
            g++ -std=c++23 -O2 -Wall
            -o tests/test_double_linked_list
            tests/test_double_linked_list.cpp double_linked_list.cpp
          command: "./tests/test_double_linked_list"
          timeout: 10
          max-score: 25

      - name: "[Soal 4] Si Palui dan Tarik Tambang Dimensi"
        id: soal4
        uses: education/autograding-command-grader@v1
        with:
          test-name: "Soal 4 - Si Palui dan Tarik Tambang Dimensi"
          setup-command: >
            g++ -std=c++23 -O2
            -o prob_b prob_b.cpp double_linked_list.cpp
          command: "bash tests/grade_io.sh ./prob_b tests/prob_b"
          timeout: 15
          max-score: 25

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        if: always()
        env:
          SOAL1_RESULTS: "${{steps.soal1.outputs.result}}"
          SOAL2_RESULTS: "${{steps.soal2.outputs.result}}"
          SOAL3_RESULTS: "${{steps.soal3.outputs.result}}"
          SOAL4_RESULTS: "${{steps.soal4.outputs.result}}"
        with:
          runners: soal1,soal2,soal3,soal4
